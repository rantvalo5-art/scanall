<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outcomes • Screener</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b10;
  --surface: #0d1117;
  --surface2: #161b22;
  --border: #21262d;
  --accent: #39d353;
  --accent-dim: rgba(57,211,83,0.12);
  --orange: #f78166;
  --blue: #58a6ff;
  --yellow: #e3b341;
  --red: #f85149;
  --green: #3fb950;
  --text: #c9d1d9;
  --muted: #484f58;
  --muted2: #30363d;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  line-height: 1.5;
  min-height: 100vh;
  padding: 20px 24px 40px;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 999;
}
header {
  display: flex; justify-content: space-between; align-items: flex-end;
  border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px;
}
h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -1px; }
.crumb { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 4px; }
.crumb span { color: var(--accent); }
.nav { display: flex; gap: 16px; }
.nav a { color: var(--muted); text-decoration: none; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
.nav a:hover { color: var(--text); }

.config-box {
  background: var(--surface); border: 1px solid var(--border);
  padding: 16px 20px; margin-bottom: 20px;
}
.config-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
.field { display: flex; flex-direction: column; gap: 5px; min-width: 160px; }
.field label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
input[type=text],input[type=password],input[type=number],select {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  font-family: 'Space Mono', monospace; font-size: 12px; padding: 6px 10px;
  outline: none; min-width: 160px;
}
input:focus, select:focus { border-color: var(--accent); }
.btn {
  font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 8px 16px; border: none; cursor: pointer;
  background: var(--accent); color: #0d1117; font-weight: 700;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--text); color: var(--text); }

#status {
  font-size: 11px; letter-spacing: 1px; min-height: 16px;
  margin-top: 8px;
}
#status.ok { color: var(--accent); }
#status.err { color: var(--orange); }
#status.loading { color: var(--blue); }

/* ── Stats grid ────────────────────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  padding: 14px 18px;
}
.stat-label {
  font-size: 10px; color: var(--muted); letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 8px;
}
.stat-value {
  font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
  color: #fff; line-height: 1; margin-bottom: 4px;
}
.stat-detail { font-size: 10px; color: var(--muted); line-height: 1.4; }
.stat-card.signal-stat { border-left: 2px solid var(--accent); }
.stat-row { display: flex; justify-content: space-between; gap: 8px; }
.stat-row + .stat-row { margin-top: 4px; }
.stat-row .k { color: var(--muted); }
.stat-row .v { color: var(--text); font-weight: 700; }
.stat-row .v.green { color: var(--green); }
.stat-row .v.red { color: var(--red); }

/* ── Table ─────────────────────────────────────────────────────────────── */
.table-wrap { background: var(--surface); border: 1px solid var(--border); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
th {
  font-size: 10px; color: var(--muted); letter-spacing: 1px;
  text-transform: uppercase; font-weight: 700; background: var(--surface2);
  position: sticky; top: 0;
}
tr:hover td { background: rgba(255,255,255,0.02); }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
td.symbol a { color: var(--blue); text-decoration: none; }
td.symbol a:hover { text-decoration: underline; }
.pill {
  font-size: 9px; padding: 2px 6px; border-radius: 2px;
  letter-spacing: 0.5px; font-weight: 700; display: inline-block;
}
.pill-best    { background: rgba(57,211,83,0.15); color: var(--accent); }
.pill-strong  { background: rgba(88,166,255,0.15); color: var(--blue); }
.pill-watch   { background: var(--muted2); color: var(--muted); }
.pill-pending { background: rgba(227,179,65,0.15); color: var(--yellow); }
.pill-complete{ background: rgba(57,211,83,0.10); color: var(--green); }
.pct.pos { color: var(--green); }
.pct.neg { color: var(--red); }
.pct.zero { color: var(--muted); }
.muted { color: var(--muted); }

@media (max-width: 700px) {
  body { padding: 16px; }
  .config-row { flex-direction: column; align-items: stretch; }
  .field { min-width: 0; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="crumb">screener / <span>outcomes</span></div>
    <h1>Tracking de outcomes</h1>
  </div>
  <nav class="nav">
    <a href="index.html">CONFIG</a>
    <a href="outcomes.html">OUTCOMES</a>
  </nav>
</header>

<div class="config-box">
  <div class="config-row">
    <div class="field">
      <label>Supabase URL</label>
      <input type="text" id="sb-url" placeholder="https://xxx.supabase.co" autocomplete="off">
    </div>
    <div class="field" style="flex:1;">
      <label>Supabase Anon Key</label>
      <input type="password" id="sb-key" placeholder="eyJhbG..." autocomplete="off">
    </div>
    <div class="field">
      <label>Filtro Signal</label>
      <select id="filter-signal">
        <option value="">TODOS</option>
        <option value="PREBREAK">PRE-BREAK</option>
        <option value="BREAKOUT">BREAKOUT</option>
        <option value="RIDING">RIDING</option>
        <option value="FADING">FADING</option>
        <option value="HOLD">HOLD</option>
      </select>
    </div>
    <div class="field">
      <label>Días</label>
      <select id="filter-days">
        <option value="1">1</option>
        <option value="3">3</option>
        <option value="7" selected>7</option>
        <option value="14">14</option>
        <option value="30">30</option>
        <option value="90">90</option>
      </select>
    </div>
    <div class="field" style="flex-direction:row; gap:8px; min-width:0;">
      <button class="btn" onclick="loadAll()">↓ CARGAR</button>
      <button class="btn btn-ghost" onclick="loadAll()">↺</button>
      <button class="btn btn-ghost" onclick="downloadJSON()" title="Descargar los outcomes actualmente cargados como JSON">⬇ JSON</button>
      <button class="btn btn-ghost" onclick="purgeOutcomes()" title="Borrar TODOS los outcomes de Supabase" style="color:var(--orange);border-color:var(--orange);">⚠ BORRAR</button>
    </div>
  </div>
  <div id="status"></div>
</div>

<div id="stats" class="stats-grid"></div>
<div class="table-wrap">
  <table id="outcomes-table">
    <thead>
      <tr>
        <th>Hora</th>
        <th>Symbol</th>
        <th>Signal</th>
        <th>TF</th>
        <th class="num">Score</th>
        <th>Bucket</th>
        <th>Vela</th>
        <th class="num">Entry</th>
        <th class="num">+15m</th>
        <th class="num">+1h</th>
        <th class="num">+4h</th>
        <th class="num">+24h</th>
        <th class="num">Max 4h</th>
        <th class="num">Min 4h</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody id="outcomes-body">
      <tr><td colspan="15" class="muted" style="text-align:center;padding:24px;">Cargá la config para ver outcomes</td></tr>
    </tbody>
  </table>
</div>

<script>
// Persistir url + anon key
['sb-url','sb-key','filter-signal','filter-days'].forEach(id => {
  const el = document.getElementById(id);
  const saved = localStorage.getItem('outcomes:' + id);
  if (saved) el.value = saved;
  el.addEventListener('change', () => localStorage.setItem('outcomes:' + id, el.value));
  el.addEventListener('input',  () => localStorage.setItem('outcomes:' + id, el.value));
});

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}

function pctFmt(entry, value) {
  if (value === null || value === undefined || entry === null || entry === undefined) {
    return '<span class="muted">—</span>';
  }
  const e = parseFloat(entry), v = parseFloat(value);
  if (!e) return '<span class="muted">—</span>';
  const pct = (v / e - 1) * 100;
  const cls = pct > 0.05 ? 'pos' : (pct < -0.05 ? 'neg' : 'zero');
  return `<span class="pct ${cls}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</span>`;
}

function formatTimeShort(iso) {
  const d = new Date(iso);
  // YYYY-MM-DD HH:MM in local
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mn = String(d.getMinutes()).padStart(2,'0');
  return `${mm}-${dd} ${hh}:${mn}`;
}

function tradingViewUrl(symbol, tf) {
  const tvMap = {'1m':'1','5m':'5','15m':'15','30m':'30','1h':'60','2h':'120','4h':'240','1d':'D'};
  const tvtf = tvMap[tf] || '15';
  return `https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}&interval=${tvtf}`;
}

async function fetchOutcomes() {
  const url = document.getElementById('sb-url').value.trim().replace(/\/$/, '');
  const key = document.getElementById('sb-key').value.trim();
  const signal = document.getElementById('filter-signal').value;
  const days = parseInt(document.getElementById('filter-days').value, 10);

  if (!url || !key) throw new Error('Faltan URL y/o Anon Key');

  const since = new Date(Date.now() - days * 86400000).toISOString();
  const params = new URLSearchParams({
    select: '*',
    order: 'alerted_at.desc',
    limit: '500',
  });
  params.append('alerted_at', `gte.${since}`);
  if (signal) params.append('signal_type', `eq.${signal}`);

  const res = await fetch(`${url}/rest/v1/screener_outcomes?${params}`, {
    headers: {
      'apikey': key,
      'Authorization': `Bearer ${key}`,
    },
  });
  if (!res.ok) {
    let msg = `${res.status} ${res.statusText}`;
    try {
      const e = await res.json();
      if (e.message) msg += ` — ${e.message}`;
    } catch(_){}
    throw new Error(msg);
  }
  return res.json();
}

function computeStats(rows) {
  // Agrupar por signal_type
  const bySig = {};
  rows.forEach(r => {
    bySig[r.signal_type] = bySig[r.signal_type] || [];
    bySig[r.signal_type].push(r);
  });

  const stats = [];
  // Stat global primero
  stats.push({ name: 'TOTAL', count: rows.length, items: rows });
  Object.keys(bySig).sort().forEach(sig => {
    stats.push({ name: sig, count: bySig[sig].length, items: bySig[sig] });
  });
  return stats;
}

function pctOf(items, fn) {
  // % de items donde fn(item) === true, ignorando los nulls
  let valid = 0, hits = 0;
  items.forEach(i => {
    const v = fn(i);
    if (v === null || v === undefined) return;
    valid++;
    if (v) hits++;
  });
  return valid > 0 ? { pct: (hits / valid * 100), valid: valid, hits: hits } : null;
}

function avgPct(items, getter) {
  // Promedio % desde entry para checkpoint dado
  const vals = [];
  items.forEach(i => {
    const v = getter(i);
    if (v !== null && v !== undefined && i.entry_price) {
      vals.push((v / i.entry_price - 1) * 100);
    }
  });
  if (!vals.length) return null;
  return vals.reduce((a,b)=>a+b, 0) / vals.length;
}

function renderStats(stats) {
  const wrap = document.getElementById('stats');
  wrap.innerHTML = '';
  stats.forEach(s => {
    const items = s.items;
    if (!items.length) return;

    const win1h  = pctOf(items, i => i.price_1h ? (i.price_1h / i.entry_price - 1) > 0.01 : null);
    const win4h  = pctOf(items, i => i.price_4h ? (i.price_4h / i.entry_price - 1) > 0.02 : null);
    const avg1h  = avgPct(items, i => i.price_1h);
    const avg4h  = avgPct(items, i => i.price_4h);
    const avg24h = avgPct(items, i => i.price_24h);

    const card = document.createElement('div');
    card.className = 'stat-card signal-stat';
    card.innerHTML = `
      <div class="stat-label">${s.name}</div>
      <div class="stat-value">${s.count}<span style="font-size:11px;font-weight:400;color:var(--muted);"> alertas</span></div>
      <div class="stat-row"><span class="k">subió >1% en 1h</span>
        <span class="v ${win1h && win1h.pct >= 50 ? 'green' : (win1h && win1h.pct < 30 ? 'red' : '')}">
          ${win1h ? `${win1h.pct.toFixed(0)}% (${win1h.hits}/${win1h.valid})` : '—'}
        </span></div>
      <div class="stat-row"><span class="k">subió >2% en 4h</span>
        <span class="v ${win4h && win4h.pct >= 50 ? 'green' : (win4h && win4h.pct < 30 ? 'red' : '')}">
          ${win4h ? `${win4h.pct.toFixed(0)}% (${win4h.hits}/${win4h.valid})` : '—'}
        </span></div>
      <div class="stat-row"><span class="k">prom. 1h</span>
        <span class="v ${avg1h !== null && avg1h > 0 ? 'green' : (avg1h !== null && avg1h < 0 ? 'red' : '')}">
          ${avg1h !== null ? `${avg1h >= 0 ? '+' : ''}${avg1h.toFixed(2)}%` : '—'}
        </span></div>
      <div class="stat-row"><span class="k">prom. 4h</span>
        <span class="v ${avg4h !== null && avg4h > 0 ? 'green' : (avg4h !== null && avg4h < 0 ? 'red' : '')}">
          ${avg4h !== null ? `${avg4h >= 0 ? '+' : ''}${avg4h.toFixed(2)}%` : '—'}
        </span></div>
      <div class="stat-row"><span class="k">prom. 24h</span>
        <span class="v ${avg24h !== null && avg24h > 0 ? 'green' : (avg24h !== null && avg24h < 0 ? 'red' : '')}">
          ${avg24h !== null ? `${avg24h >= 0 ? '+' : ''}${avg24h.toFixed(2)}%` : '—'}
        </span></div>
    `;
    wrap.appendChild(card);
  });
}

function renderTable(rows) {
  const tbody = document.getElementById('outcomes-body');
  tbody.innerHTML = '';
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="15" class="muted" style="text-align:center;padding:24px;">No hay outcomes con esos filtros</td></tr>';
    return;
  }
  rows.forEach(r => {
    const bucketCls = r.bucket === 'BEST' ? 'pill-best' : (r.bucket === 'STRONG' ? 'pill-strong' : 'pill-watch');
    const stateCls  = r.outcomes_complete ? 'pill-complete' : 'pill-pending';
    const stateTxt  = r.outcomes_complete ? 'COMPLETE' : 'PENDING';
    const veladot   = r.candle_status === 'forming' ? '🟡' : '✅';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${formatTimeShort(r.alerted_at)}</td>
      <td class="symbol"><a href="${tradingViewUrl(r.symbol, r.timeframe)}" target="_blank">${r.symbol}</a></td>
      <td>${r.signal_type}</td>
      <td>${r.timeframe}</td>
      <td class="num">${r.score}</td>
      <td><span class="pill ${bucketCls}">${r.bucket || '—'}</span></td>
      <td>${veladot}</td>
      <td class="num">${r.entry_price ? parseFloat(r.entry_price).toPrecision(6) : '—'}</td>
      <td class="num">${pctFmt(r.entry_price, r.price_15m)}</td>
      <td class="num">${pctFmt(r.entry_price, r.price_1h)}</td>
      <td class="num">${pctFmt(r.entry_price, r.price_4h)}</td>
      <td class="num">${pctFmt(r.entry_price, r.price_24h)}</td>
      <td class="num">${pctFmt(r.entry_price, r.max_high_4h)}</td>
      <td class="num">${pctFmt(r.entry_price, r.min_low_4h)}</td>
      <td><span class="pill ${stateCls}">${stateTxt}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

async function loadAll() {
  setStatus('Cargando...', 'loading');
  try {
    const rows = await fetchOutcomes();
    window._lastLoadedRows = rows;  // para descarga posterior
    const stats = computeStats(rows);
    renderStats(stats);
    renderTable(rows);
    setStatus(`✓ ${rows.length} outcomes cargados`, 'ok');
  } catch (e) {
    setStatus('✗ ' + e.message, 'err');
  }
}

// ── Descargar outcomes cargados como JSON ────────────────────────────────────
function downloadJSON() {
  const rows = window._lastLoadedRows;
  if (!rows || !rows.length) {
    setStatus('✗ No hay datos cargados — pulsá CARGAR primero', 'err');
    return;
  }
  const days = document.getElementById('filter-days').value;
  const signal = document.getElementById('filter-signal').value || 'ALL';
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const filename = `outcomes_${signal}_${days}d_${ts}.json`;

  const blob = new Blob([JSON.stringify(rows, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setStatus(`✓ Descargado ${filename} (${rows.length} filas)`, 'ok');
}

// ── Borrar TODOS los outcomes de Supabase ────────────────────────────────────
async function purgeOutcomes() {
  const url = document.getElementById('sb-url').value.trim().replace(/\/$/, '');
  const key = document.getElementById('sb-key').value.trim();
  if (!url || !key) {
    setStatus('✗ Faltan URL y/o Anon Key', 'err');
    return;
  }

  // Doble confirmación. La acción es destructiva e irreversible.
  const ok1 = confirm(
    '⚠ ATENCIÓN\n\n' +
    'Esto va a BORRAR TODOS los outcomes de Supabase. Esta acción es IRREVERSIBLE.\n\n' +
    'Antes de continuar:\n' +
    '  1) Asegurate de haber descargado el JSON (botón ⬇ JSON).\n' +
    '  2) Solo hace falta hacer esto si cambiaste la lógica del screener y querés empezar dataset limpio.\n\n' +
    '¿Continuar?'
  );
  if (!ok1) {
    setStatus('Cancelado', '');
    return;
  }
  const confirmText = prompt(
    'Para confirmar, escribí: BORRAR\n\n(en mayúsculas, sin comillas)'
  );
  if (confirmText !== 'BORRAR') {
    setStatus('Cancelado: la confirmación no coincidió', '');
    return;
  }

  setStatus('Borrando outcomes...', 'loading');
  try {
    // Supabase REST: DELETE /rest/v1/<table>?<filtro>
    // Necesitamos un filtro siempre — usamos id no nulo (matchea todo) o un timestamp lejano.
    // El más confiable: filtro por alerted_at < hoy + 1 día (matchea todo).
    const futureDate = new Date(Date.now() + 86400000).toISOString();
    const params = new URLSearchParams();
    params.append('alerted_at', `lt.${futureDate}`);

    const res = await fetch(`${url}/rest/v1/screener_outcomes?${params}`, {
      method: 'DELETE',
      headers: {
        'apikey': key,
        'Authorization': `Bearer ${key}`,
        'Prefer': 'return=representation',  // devuelve filas borradas
      },
    });

    if (!res.ok) {
      let msg = `${res.status} ${res.statusText}`;
      try {
        const e = await res.json();
        if (e.message) msg += ` — ${e.message}`;
        if (e.hint) msg += ` (${e.hint})`;
      } catch(_){}
      throw new Error(msg);
    }

    let deletedCount = '?';
    try {
      const deleted = await res.json();
      deletedCount = Array.isArray(deleted) ? deleted.length : '?';
    } catch(_){}

    // Limpiar UI
    window._lastLoadedRows = [];
    document.getElementById('stats').innerHTML = '';
    document.getElementById('outcomes-body').innerHTML =
      '<tr><td colspan="15" class="muted" style="text-align:center;padding:24px;">Tabla vaciada — pulsá CARGAR para refrescar</td></tr>';

    setStatus(`✓ Borrados ${deletedCount} outcomes. Dataset limpio para nueva versión.`, 'ok');
  } catch (e) {
    setStatus('✗ Error borrando: ' + e.message, 'err');
  }
}
</script>
</body>
</html>
